<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اسب سیاه | درمانگر</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Vazirmatn',Tahoma,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .container{max-width:600px;width:100%;padding:20px;text-align:center}
    h1{color:#f0c040;margin-bottom:10px}
    h2{color:#d4af37;margin:20px 0 10px}
    p{line-height:2;color:#bbb;margin-bottom:15px}
    .card{background:#1a1a2e;border-radius:20px;padding:30px 20px;margin:20px 0;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
    .card-text{font-size:1.2rem;line-height:2.2;margin-bottom:25px}
    .btn-group{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn{padding:14px 28px;border:none;border-radius:60px;font-size:1rem;cursor:pointer;transition:all .2s;background:#2a2a3e;color:#ddd}
    .btn:hover{background:#3a3a5e}
    .btn-primary{background:#d4af37;color:#000;font-weight:bold}
    .btn-primary:hover{background:#f0c040}
    .btn-heart{background:#c04060;color:#fff;font-size:1.2rem;padding:15px 35px}
    .btn-heart:hover{background:#e05070}
    .btn-skip{background:#444;color:#ccc}
    .gate-grid{display:grid;grid-template-columns:1fr;gap:15px;margin-bottom:20px}
    @media(min-width:500px){.gate-grid{grid-template-columns:1fr 1fr}}
    .gate-option{background:#1e1e32;border:2px solid #333;border-radius:16px;padding:18px;cursor:pointer;text-align:right;color:#ccc;transition:.2s}
    .gate-option.selected{border-color:#d4af37;background:#2a2a22;color:#f0c040}
    .progress-bar{width:100%;height:6px;background:#2a2a3e;border-radius:3px;margin:10px 0}
    .progress-fill{height:100%;background:#d4af37;border-radius:3px;transition:width .4s}
    .result-card{background:#1e1e32;border-radius:16px;padding:20px;margin:18px 0;border-right:6px solid #d4af37;text-align:right}
    .result-card h3{color:#f0c040}
    .score{font-size:1.4rem;font-weight:bold;color:#d4af37}
    .hidden{display:none!important}
  </style>
</head>

let allMicro = [];
let state = {
  phase: 'splash',
  realmGate: null,
  corridor: null,
  treasureCards: [],
  treasureIndex: 0,
  likes: [],
  stratIdx: 0,
  strats: [],
  valIdx: 0,
  vals: []
};

async function loadMicro() {
  const r = await fetch(RAW_DATA);
  allMicro = await r.json();
}

function render() {
  const a = document.getElementById('app');
  switch(state.phase) {
    case 'splash':
      a.innerHTML = `<h1>🐴 اسب سیاه</h1><div class="card"><p>در ۱۰ دقیقه فردیت درونی‌ات را کشف کن.</p><button class="btn btn-primary" onclick="start()">شروع</button></div>`;
      break;
    case 'gate':
      a.innerHTML = `<h2>🏥 قلمرو درمانگر</h2><p>در یک مرکز درمانی بزرگ، کدام بخش تو را صدا می‌زند؟</p><div class="gate-grid" id="gates"></div><button class="btn btn-primary" onclick="goCorridor()">ادامه</button>`;
      renderGates();
      break;
    case 'corridor':
      a.innerHTML = `<h2>🏥 دقیق‌تر بگو</h2><div class="gate-grid" id="corr"></div><button class="btn btn-primary" onclick="startTreasure()">شکار جرقه‌ها</button>`;
      renderCorridor();
      break;
    case 'treasure':
      if (state.treasureIndex < state.treasureCards.length) {
        const c = state.treasureCards[state.treasureIndex];
        a.innerHTML = `<h2>🔥 جرقهٔ انرژی</h2><div class="card"><p class="card-text">${c.desc}</p><div class="btn-group"><button class="btn btn-heart" onclick="likeCard(true)">❤️</button><button class="btn btn-skip" onclick="likeCard(false)">❌</button></div></div><div class="progress-bar"><div class="progress-fill" style="width:${((state.treasureIndex+1)/state.treasureCards.length)*100}%"></div></div>`;
      } else {
        state.phase = 'strategies';
        state.stratIdx = 0;
        state.strats = [];
        render();
      }
      break;
    case 'strategies':
      if (state.stratIdx < STRATEGY_QUESTIONS.length) {
        const q = STRATEGY_QUESTIONS[state.stratIdx];
        const opts = STRATEGY_OPTIONS[state.stratIdx];
        a.innerHTML = `<h2>🧭 راهبرد</h2><div class="card"><p>${q}</p>${opts.map((o,i) => `<div class="gate-option" style="margin-bottom:8px" onclick="selectStrategy(${i})">${o}</div>`).join('')}<button class="btn btn-primary" onclick="nextStrategy()">بعدی</button></div>`;
      } else {
        state.phase = 'values';
        state.valIdx = 0;
        state.vals = [];
        render();
      }
      break;
    case 'values':
      if (state.valIdx < VALUE_QUESTIONS.length) {
        const q = VALUE_QUESTIONS[state.valIdx];
        const opts = VALUE_OPTIONS[state.valIdx];
        a.innerHTML = `<h2>⚖️ ارزش</h2><div class="card"><p>${q}</p><button class="btn btn-heart" style="margin:5px" onclick="selectValue('A')">${opts[0]}</button><button class="btn btn-skip" style="margin:5px" onclick="selectValue('B')">${opts[1]}</button></div>`;
      } else {
        submitResults();
      }
      break;
    case 'results':
      a.innerHTML = `<h2>📊 نتایج</h2><div id="res"></div>`;
      break;
  }
}

    {id:'C',txt:'بخش مراقبت و همراهی',codes:['MIDW-','PHYSIO-','OCT-','SLP-','AUD-','OPT-','PROS-','GER-','HED-']},
    {id:'D',txt:'بخش دارو و بیوتکنولوژی',codes:['PHAR-','BIOT-','NANO-','NUT-']},
    {id:'E',txt:'بخش مدیریت سلامت و بهداشت',codes:['PUBH-','ENVH-','OCCH-','HSM-','HEC-','HIT-','EHE-','REH-']},
    {id:'F',txt:'بخش دندان و دام',codes:['DENT-','VET-','BME-']}
  ];
  document.getElementById('gates').innerHTML = gates.map(g => 
    `<div class="gate-option ${state.realmGate===g.id?'selected':''}" onclick="state.realmGate=state.realmGate===g.id?null:g.id;renderGates()">${g.txt}</div>`
  ).join('');
}

function goCorridor() {
  if (!state.realmGate) { alert('لطفاً یک بخش را انتخاب کن'); return; }
  state.phase = 'corridor';
  state.corridor = null;
  render();
}

function renderCorridor() {
  const corridors = {
    A: [{id:'A1',txt:'مداخلهٔ فوری پزشکی',codes:['MED-','EMER-']},{id:'A2',txt:'پرستاری و مراقبت بحرانی',codes:['NURS-','ANES-','OR-']}],
    B: [{id:'B1',txt:'تشخیص آزمایشگاهی',codes:['LAB-','BIOC-','MICROM-','IMM-','PARA-','VIRO-']},{id:'B2',txt:'تصویربرداری و پزشکی هسته‌ای',codes:['RAD-','RADT-','NUCM-','IMGT-']},{id:'B3',txt:'ژنتیک و بیوتکنولوژی',codes:['GEN-']}],
    C: [{id:'C1',txt:'توانبخشی فیزیکی',codes:['PHYSIO-','OCT-','PROS-']},{id:'C2',txt:'توانبخشی حسی و گفتاری',codes:['SLP-','AUD-','OPT-']},{id:'C3',txt:'مراقبت عاطفی و همراهی',codes:['MIDW-','GER-','HED-']}],
    D: [{id:'D1',txt:'داروسازی و تغذیه',codes:['PHAR-','NUT-']},{id:'D2',txt:'بیوتکنولوژی و نانو',codes:['BIOT-','NANO-']}],
    E: [{id:'E1',txt:'بهداشت و محیط',codes:['PUBH-','ENVH-','OCCH-','EHE-']},{id:'E2',txt:'مدیریت سلامت',codes:['HSM-','HEC-','HIT-','REH-']}],
    F: [{id:'F1',txt:'دندانپزشکی',codes:['DENT-']},{id:'F2',txt:'دامپزشکی و مهندسی پزشکی',codes:['VET-','BME-']}]
  };
  const opts = corridors[state.realmGate] || [];
  document.getElementById('corr').innerHTML = opts.map(o => 
    `<div class="gate-option ${state.corridor===o.id?'selected':''}" onclick="state.corridor=state.corridor===o.id?null:o.id;renderCorridor()">${o.txt}</div>`
  ).join('');
}

function startTreasure() {
  if (!state.corridor) { alert('یک گزینه انتخاب کن'); return; }
  const corridors = {
    A1:['MED-','EMER-'], A2:['NURS-','ANES-','OR-'],
    B1:['LAB-','BIOC-','MICROM-','IMM-','PARA-','VIRO-'], B2:['RAD-','RADT-','NUCM-','IMGT-'], B3:['GEN-'],
    C1:['PHYSIO-','OCT-','PROS-'], C2:['SLP-','AUD-','OPT-'], C3:['MIDW-','GER-','HED-'],
    D1:['PHAR-','NUT-'], D2:['BIOT-','NANO-'],
    E1:['PUBH-','ENVH-','OCCH-','EHE-'], E2:['HSM-','HEC-','HIT-','REH-'],
    F1:['DENT-'], F2:['VET-','BME-']
  };
  const prefixes = corridors[state.corridor] || [];
  state.treasureCards = allMicro.filter(m => prefixes.some(p => m.code.startsWith(p)));
  state.treasureIndex = 0;
  state.likes = [];
  state.phase = 'treasure';
  render();
}

function likeCard(liked) {
  if (liked) state.likes.push(state.treasureCards[state.treasureIndex].code);
  state.treasureIndex++;
  render();
}

function selectStrategy(idx) { state.strats[state.stratIdx] = idx; }
function nextStrategy() {
  if (state.strats[state.stratIdx] === undefined) { alert('لطفاً یک گزینه را انتخاب کن'); return; }
  state.stratIdx++;
  render();
}

function selectValue(val) {
  const qNum = state.valIdx + 1;
  state.vals[state.valIdx] = 'Q' + qNum + val;
  state.valIdx++;
  render();
}

async function submitResults() {
  state.phase = 'results';
  render();
  const payload = {
    micro_motives: state.likes,
    strategies: state.strats,
    values: state.vals
  };
  const res = await fetch(API, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  document.getElementById('res').innerHTML = data.slice(0,10).map(m => 
    `<div class="result-card">
      <h3>${m.name} (${m.group})</h3>
      <p class="score">${m.total_score}% تطابق</p>
      <p>انگیزه: ${m.m_score}% | راهبرد: ${m.s_score}% | ارزش: ${m.v_score}%</p>
      ${m.common_micro_motives?.length ? '<p><strong>جرقه‌های مشترک:</strong> ' + m.common_micro_motives.map(c => c.description).join('، ') + '</p>' : ''}
    </div>`
  ).join('');
}

async function start() {
  if (!allMicro.length) await loadMicro();
  state.phase = 'gate';
  render();
}

loadMicro();
render();
</script>
</body>
</html>
